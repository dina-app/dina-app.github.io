<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Princess Color Match</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="home game-page">
    <a class="back-link" href="../index.html">← Back to game hub</a>
    <article class="game-card game-card-girls">
      <h1>Princess Color Match</h1>
      <p>Pick your favorite color style for the princess look.</p>
      <div class="rps-controls">
        <button class="color-btn" data-theme="pink">💖 Pink</button>
        <button class="color-btn" data-theme="purple">🪻 Purple</button>
        <button class="color-btn" data-theme="gold">✨ Gold</button>
      </div>
      <div id="dressPreview" class="dress-preview">👗</div>
      <p id="dressResult" class="result">Choose a color to style the dress.</p>
    </article>
  </main>
  <script src="../game.js"></script>
</body>
</html>
