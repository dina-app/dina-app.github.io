<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="home game-page">
    <a class="back-link" href="../index.html">← Back to game hub</a>
    <article class="game-card">
      <h1>Rock • Paper • Scissors</h1>
      <p>Pick your move and try to beat the computer.</p>
      <div class="rps-controls">
        <button class="rps-btn" data-move="rock">🪨 Rock</button>
        <button class="rps-btn" data-move="paper">📄 Paper</button>
        <button class="rps-btn" data-move="scissors">✂️ Scissors</button>
      </div>
      <p id="rpsResult" class="result">Choose a move to start.</p>
    </article>
  </main>
  <script src="../game.js"></script>
</body>
</html>
