<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Drawing Pad</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Magic Drawing Pad</h1>
      <div class="actions">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="restartBtn" type="button">Restart</button>
      </div>
    </header>

    <canvas id="gameCanvas" width="960" height="540" aria-label="Sky Runner endless runner game"></canvas>

    <section class="meta">
      <p><strong>Introducing:</strong> Magic Drawing Pad by Anna Yoshie.</p>
      <p><strong>Welcome:</strong> Sketch, imagine, and bring colorful ideas to life.</p>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
