<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna Run And Catch The Ball</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --accent: #22d3ee;
      --accent-2: #f472b6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 20% 10%, #1e293b, #0f172a 60%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .game-shell {
      width: min(900px, 100%);
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 18px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
      padding: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 3vw, 2rem);
    }

    .subtitle {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .stat {
      background: #1f2937;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 10px;
      padding: 6px 10px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: linear-gradient(#0ea5e9 0%, #7dd3fc 45%, #86efac 46%, #4ade80 100%);
      display: block;
    }

    .controls {
      margin-top: 12px;
      color: var(--muted);
      display: flex;
      gap: 10px;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #111827;
      font-weight: 700;
      padding: 9px 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <h1>Anna Run And Catch The Ball</h1>
    <p class="subtitle">Help a small girl with a bag run left and right to catch falling balls.</p>

    <div class="stats">
      <div class="stat">Score: <span id="score">0</span></div>
      <div class="stat">Lives: <span id="lives">3</span></div>
      <div class="stat">Level: <span id="level">1</span></div>
    </div>

    <canvas id="game" width="960" height="540" aria-label="Anna Run And Catch The Ball game"></canvas>

    <div class="controls">
      <span>Controls: ⬅️ ➡️ Arrow keys or move your mouse/finger to run.</span>
      <button id="restart">Restart</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const levelEl = document.getElementById('level');
    const restartBtn = document.getElementById('restart');

    const world = {
      w: canvas.width,
      h: canvas.height,
      groundY: canvas.height - 70,
      score: 0,
      lives: 3,
      level: 1,
      ballSpeed: 1.6,
      spawnEvery: 1050,
      lastSpawnAt: 0,
      balls: [],
      running: true,
      lastTime: 0
    };

    const player = {
      x: world.w / 2,
      y: world.groundY,
      speed: 6,
      width: 56,
      bagWidth: 42,
      movingLeft: false,
      movingRight: false
    };

    function resetGame() {
      world.score = 0;
      world.lives = 3;
      world.level = 1;
      world.ballSpeed = 1.6;
      world.spawnEvery = 1050;
      world.balls = [];
      world.lastSpawnAt = 0;
      world.running = true;
      player.x = world.w / 2;
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = world.score;
      livesEl.textContent = world.lives;
      levelEl.textContent = world.level;
    }

    function spawnBall(now) {
      if (now - world.lastSpawnAt < world.spawnEvery) return;
      world.lastSpawnAt = now;
      const radius = 10 + Math.random() * 12;
      world.balls.push({
        x: radius + Math.random() * (world.w - radius * 2),
        y: -20,
        vy: world.ballSpeed + Math.random() * 0.9,
        radius
      });
    }

    function drawPlayer() {
      const x = player.x;
      const y = player.y;

      ctx.fillStyle = '#111827';
      ctx.beginPath();
      ctx.arc(x, y - 72, 16, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(x, y - 56);
      ctx.lineTo(x, y - 18);
      ctx.stroke();

      ctx.strokeStyle = '#fca5a5';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(x, y - 48);
      ctx.lineTo(x - 18, y - 30);
      ctx.moveTo(x, y - 48);
      ctx.lineTo(x + 20, y - 32);
      ctx.stroke();

      ctx.strokeStyle = '#111827';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(x, y - 18);
      ctx.lineTo(x - 14, y + 16);
      ctx.moveTo(x, y - 18);
      ctx.lineTo(x + 14, y + 16);
      ctx.stroke();

      ctx.fillStyle = '#8b5cf6';
      ctx.fillRect(x + 16, y - 40, player.bagWidth, 34);
      ctx.strokeStyle = '#c4b5fd';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x + 16, y - 36);
      ctx.quadraticCurveTo(x + 36, y - 52, x + 58, y - 36);
      ctx.stroke();
    }

    function drawBall(ball) {
      ctx.fillStyle = '#f97316';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.arc(ball.x - ball.radius / 3, ball.y - ball.radius / 3, ball.radius / 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function updatePlayer() {
      if (player.movingLeft) player.x -= player.speed;
      if (player.movingRight) player.x += player.speed;
      player.x = Math.max(25, Math.min(world.w - 65, player.x));
    }

    function updateBalls() {
      const bagLeft = player.x + 14;
      const bagRight = bagLeft + player.bagWidth + 8;
      const bagTop = player.y - 42;
      const bagBottom = player.y - 2;

      world.balls = world.balls.filter((ball) => {
        ball.y += ball.vy;

        const caught =
          ball.x + ball.radius > bagLeft &&
          ball.x - ball.radius < bagRight &&
          ball.y + ball.radius > bagTop &&
          ball.y - ball.radius < bagBottom;

        if (caught) {
          world.score += 1;
          if (world.score % 8 === 0) {
            world.level += 1;
            world.ballSpeed += 0.2;
            world.spawnEvery = Math.max(450, world.spawnEvery - 50);
          }
          updateHud();
          return false;
        }

        if (ball.y - ball.radius > world.groundY + 18) {
          world.lives -= 1;
          if (world.lives <= 0) {
            world.running = false;
          }
          updateHud();
          return false;
        }

        return true;
      });
    }

    function drawScene() {
      ctx.clearRect(0, 0, world.w, world.h);

      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(0, world.groundY + 20, world.w, 6);

      drawPlayer();
      world.balls.forEach(drawBall);

      if (!world.running) {
        ctx.fillStyle = 'rgba(15, 23, 42, 0.72)';
        ctx.fillRect(0, 0, world.w, world.h);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 56px Inter, sans-serif';
        ctx.fillText('Game Over', world.w / 2, world.h / 2 - 20);
        ctx.font = '28px Inter, sans-serif';
        ctx.fillText(`Final score: ${world.score}`, world.w / 2, world.h / 2 + 32);
      }
    }

    function frame(time) {
      if (!world.lastTime) world.lastTime = time;
      const now = time;

      if (world.running) {
        updatePlayer();
        spawnBall(now);
        updateBalls();
      }

      drawScene();
      requestAnimationFrame(frame);
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') player.movingLeft = true;
      if (e.key === 'ArrowRight') player.movingRight = true;
    });

    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft') player.movingLeft = false;
      if (e.key === 'ArrowRight') player.movingRight = false;
    });

    function pointerMove(clientX) {
      const rect = canvas.getBoundingClientRect();
      const x = (clientX - rect.left) * (world.w / rect.width);
      player.x = x;
    }

    canvas.addEventListener('mousemove', (e) => pointerMove(e.clientX));
    canvas.addEventListener('touchmove', (e) => {
      if (e.touches[0]) pointerMove(e.touches[0].clientX);
    }, { passive: true });

    restartBtn.addEventListener('click', resetGame);

    resetGame();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
