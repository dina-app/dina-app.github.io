<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Sky Runner</h1>
      <div class="actions">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="restartBtn" type="button">Restart</button>
      </div>
    </header>

    <canvas id="gameCanvas" width="960" height="540" aria-label="Sky Runner endless runner game"></canvas>

    <section class="meta">
      <p><strong>Controls:</strong> Hold <kbd>Space</kbd>, click, or touch to hover up.</p>
      <p><strong>Tip:</strong> Collect cyan crystals for +10 score and energy boost. Grab power-ups for shields and slow motion.</p>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
