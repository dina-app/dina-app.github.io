<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Common Tools | DinaLab</title>
  <meta name="description" content="Browser-only common tools for developers and admins.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="../">
        <span class="brand-mark">D</span>
        <span>DinaLab</span>
      </a>
      <div class="topbar-title">
        <h1>Common Tools</h1>
        <p>Developer and admin workbench</p>
      </div>
      <div class="topbar-actions">
        <button type="button" id="siteLangToggle" class="lang-toggle" aria-label="日本語で表示"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M3.5 9h17M3.5 15h17"></path><path d="M12 3c2.5 2.7 3.8 5.8 3.8 9s-1.3 6.3-3.8 9c-2.5-2.7-3.8-5.8-3.8-9S9.5 5.7 12 3z"></path></svg><span class="lang-label">日本語</span></button>
        <a class="home-link" href="../">Home</a>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" aria-label="Tool launcher">
        <label class="search-label" for="toolSearch">Search tools</label>
        <input id="toolSearch" class="search-input" type="search" placeholder="JSON, CSV, diff, date">
        <div id="toolNav" class="tool-nav"></div>
      </aside>

      <main class="tool-area" aria-live="polite">
        <section class="tool-head" aria-labelledby="toolTitle">
          <div>
            <p id="toolGroup" class="eyebrow"></p>
            <h2 id="toolTitle"></h2>
            <p id="toolSummary" class="tool-summary"></p>
          </div>
          <div id="exampleBar" class="example-bar" aria-label="Examples"></div>
        </section>

        <section id="toolContent" class="tool-content"></section>
        <p id="statusLine" class="status-line" role="status"></p>
      </main>
    </div>
  </div>

  <script src="app.js" defer></script>
  <script src="../assets/site-language.js" defer></script>
</body>
</html>
